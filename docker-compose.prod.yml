services:
  prout:
    image: ghcr.io/dominikpalatynski/prout:0.0.1
    container_name: prout
    restart: unless-stopped
    stop_grace_period: 35s
    working_dir: /opt/prout
    command:
      - server
      - --config
      - /opt/prout/server.yml
    ports:
      - "8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/prout:/opt/prout
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.prout.rule=Host(`<your-domain-here>)"
      - "traefik.http.routers.prout.entrypoints=websecure"
      - "traefik.http.routers.prout.tls=true"
      - "traefik.http.routers.prout.tls.certresolver=letsencrypt"
      - "traefik.http.services.prout.loadbalancer.server.port=8090"
    networks:
      - proxy
  traefik:
    image: traefik:v3.5
    container_name: traefik
    restart: unless-stopped

    command:
      # Docker provider, dla kontenerów
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"

      # File provider, dla usług poza Dockerem
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"

      # EntryPoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # Redirect HTTP -> HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      # Default TLS
      - "--entrypoints.websecure.http.tls=true"
      - "--entrypoints.websecure.http.tls.certresolver=letsencrypt"

      # Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.email=palatynski.dominik@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"

      - "--api.dashboard=true"
      - "--log.level=INFO"
      - "--accesslog=true"

    ports:
      - "80:80"
      - "443:443"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
      - "./dynamic:/etc/traefik/dynamic:ro"

    networks:
      - proxy

networks:
  proxy:
    external: true
