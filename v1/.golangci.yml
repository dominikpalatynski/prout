version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - bodyclose
    - sqlclosecheck
    - rowserrcheck
    - noctx
    - errorlint
    - nilerr
    - wastedassign
    - copyloopvar
    - contextcheck
    - gosec
    - tparallel
    - testifylint
    - revive
    - misspell
    - unconvert
    - unparam

  settings:
    gosec:
      excludes:
        - G104    # already covered by errcheck
        - G304    # false positive on embed.FS
    revive:
      rules:
        - name: var-naming
        - name: error-return
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: errorf
        # `exported` rule deliberately disabled until end of MVP

formatters:
  enable:
    - gofumpt
    - gci
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/dominikpalatynski/toolshed)

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, gosec, revive, unparam]
    - path: ".+_templ\\.go$"
      linters: [revive, unused, unparam, gosec]
    - path: "internal/store/sqlc/.*"
      linters: [revive, unused, unparam]
