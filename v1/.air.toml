root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/toolshed ./cmd/toolshed"
  bin = "./tmp/toolshed"
  full_bin = "./tmp/toolshed server"
  include_ext = ["go"]
  exclude_dir = ["tmp", "bin", "vendor", ".task", "internal/web/static", "node_modules"]
  exclude_regex = [".*_templ\\.go$"]
  delay = 500

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
