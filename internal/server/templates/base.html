{{define "base"}}<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>{{.Title}}</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --accent-h: 155;
  --accent: oklch(0.62 0.13 var(--accent-h));
  --accent-hover: oklch(0.56 0.13 var(--accent-h));
  --accent-fg: #fff;
  --accent-bg: color-mix(in oklab, var(--accent) 14%, transparent);

  --bg: #fbfbfa;
  --surface: #ffffff;
  --surface-hover: #f4f4f3;
  --surface-sunken: #f7f7f6;
  --fg: #0c0c0d;
  --fg-muted: #62636a;
  --fg-faint: #9ea0a6;
  --border: #e6e6e3;
  --border-faint: #efefec;
  --input-bg: #ffffff;
  --dot: rgba(20, 20, 25, 0.06);

  --success: oklch(0.62 0.14 152);
  --warning: oklch(0.66 0.13 70);
  --danger: oklch(0.58 0.18 25);
  --danger-hover: oklch(0.52 0.18 25);
}

html[data-theme="dark"] {
  --bg: #0c0c0d;
  --surface: #161618;
  --surface-hover: #1d1d20;
  --surface-sunken: #121214;
  --fg: #f3f3f1;
  --fg-muted: #9c9da3;
  --fg-faint: #5f6066;
  --border: #25252a;
  --border-faint: #1d1d20;
  --input-bg: #131316;
  --dot: rgba(255, 255, 255, 0.05);

  --accent: oklch(0.7 0.14 var(--accent-h));
  --accent-hover: oklch(0.76 0.14 var(--accent-h));
  --accent-fg: #0c0c0d;
  --accent-bg: color-mix(in oklab, var(--accent) 18%, transparent);

  --success: oklch(0.72 0.14 152);
  --warning: oklch(0.78 0.13 75);
  --danger: oklch(0.7 0.18 25);
  --danger-hover: oklch(0.62 0.18 25);

  color-scheme: dark;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  min-height: 100vh;
  background-image: radial-gradient(circle at 1px 1px, var(--dot) 1px, transparent 0);
  background-size: 22px 22px;
}

button { font-family: var(--font-sans); }
code { font-family: var(--font-mono); font-size: 0.92em; }

input:focus, button:focus { outline: none; }

.shell {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  height: 56px;
  padding-inline: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-faint);
  background: color-mix(in oklab, var(--bg) 85%, transparent);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 10;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: inherit;
}
.brand-name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.015em;
}
.brand-version {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--surface-hover);
  color: var(--fg-muted);
  font-family: var(--font-mono);
}
.header-right {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 13px;
  color: var(--fg-muted);
}
.host-status {
  display: flex;
  align-items: center;
  gap: 6px;
}
.host-status .dot {
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: var(--success);
}
.host-status .host {
  font-family: var(--font-mono);
  font-size: 12px;
}
.theme-toggle {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--fg-muted);
  border-radius: 8px;
  height: 30px;
  width: 30px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 120ms ease;
}
.theme-toggle:hover {
  background: var(--surface-hover);
  color: var(--fg);
}

.breadcrumb {
  padding-inline: 28px;
  padding-block: 12px;
  font-size: 12px;
  color: var(--fg-muted);
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
}
.breadcrumb a {
  color: inherit;
  text-decoration: none;
}
.breadcrumb a:hover { color: var(--fg); }
.breadcrumb .sep { color: var(--fg-faint); }
.breadcrumb .current { color: var(--fg); }

.content {
  flex: 1;
  display: flex;
  justify-content: center;
  padding-inline: 28px;
  padding-bottom: 48px;
}
.content-inner {
  width: 100%;
  max-width: 560px;
  margin: 12px auto 0;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

h1.page-title {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.022em;
  margin: 0;
}
.page-lede {
  font-size: 14px;
  color: var(--fg-muted);
  margin: 6px 0 0;
  line-height: 1.5;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 32px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.06);
  width: 100%;
}
.card.flush { padding: 0; }

.card-header {
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-faint);
}
.card-body { padding: 6px 24px 16px; }

.icon-tile {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--surface-hover);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--fg);
  flex-shrink: 0;
}
.icon-tile.accent {
  background: var(--accent-bg);
  color: var(--accent);
}

.title-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.title-row .title-text {
  display: flex;
  flex-direction: column;
}
.title-row .title-text .name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.title-row .title-text .sub {
  font-size: 12.5px;
  color: var(--fg-muted);
  font-family: var(--font-mono);
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.field label {
  font-size: 13px;
  font-weight: 500;
  color: var(--fg);
  letter-spacing: -0.005em;
}
.field .hint {
  font-size: 12px;
  color: var(--fg-muted);
  line-height: 1.5;
}
.field .err {
  font-size: 12px;
  color: var(--danger);
  line-height: 1.5;
}

.input-shell {
  display: flex;
  align-items: center;
  height: 38px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  transition: all 120ms ease;
  overflow: hidden;
}
.input-shell:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 18%, transparent);
}
.input-shell.invalid {
  border-color: var(--danger);
}
.input-shell.invalid:focus-within {
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--danger) 18%, transparent);
}
.input-shell input {
  flex: 1;
  height: 100%;
  padding: 0 12px;
  background: transparent;
  border: none;
  outline: none;
  color: var(--fg);
  font-size: 14px;
  font-family: var(--font-sans);
  letter-spacing: -0.005em;
  width: 100%;
}
.input-shell input.mono {
  font-family: var(--font-mono);
  letter-spacing: -0.01em;
}
.input-shell .reveal {
  height: 36px;
  width: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  color: var(--fg-muted);
  cursor: pointer;
}
.input-shell .reveal:hover { color: var(--fg); }

.btn {
  height: 36px;
  padding: 0 14px;
  font-size: 14px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  border: 1px solid transparent;
  border-radius: 8px;
  transition: all 120ms ease;
  font-family: var(--font-sans);
  letter-spacing: -0.005em;
  text-decoration: none;
}
.btn-primary {
  background: var(--accent);
  color: var(--accent-fg);
  border-color: var(--accent);
  box-shadow: 0 1px 2px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.08);
}
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn-secondary {
  background: var(--surface);
  color: var(--fg);
  border-color: var(--border);
}
.btn-secondary:hover { background: var(--surface-hover); }
.btn-danger-outline {
  background: transparent;
  color: var(--danger);
  border-color: color-mix(in oklab, var(--danger) 35%, transparent);
}
.btn-danger-outline:hover { background: color-mix(in oklab, var(--danger) 8%, transparent); }

.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 22px;
  padding: 0 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  font-family: var(--font-sans);
  white-space: nowrap;
}
.pill .pill-dot {
  width: 6px;
  height: 6px;
  border-radius: 999px;
}
.pill-success {
  background: color-mix(in oklab, var(--success) 12%, transparent);
  color: var(--success);
}
.pill-success .pill-dot { background: var(--success); }
.pill-warning {
  background: color-mix(in oklab, var(--warning) 14%, transparent);
  color: var(--warning);
}
.pill-warning .pill-dot { background: var(--warning); }
.pill-danger {
  background: color-mix(in oklab, var(--danger) 12%, transparent);
  color: var(--danger);
}
.pill-danger .pill-dot { background: var(--danger); }
.pill-neutral {
  background: var(--surface-hover);
  color: var(--fg-muted);
}
.pill-neutral .pill-dot { background: var(--fg-faint); }

.section-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.section-row {
  text-decoration: none;
  color: inherit;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  gap: 16px;
  transition: all 120ms ease;
}
.section-row:hover {
  border-color: color-mix(in oklab, var(--accent) 35%, var(--border));
  background: color-mix(in oklab, var(--accent) 3%, var(--surface));
}
.section-row .row-text {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}
.section-row .row-head {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.section-row .row-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--fg);
  letter-spacing: -0.01em;
  white-space: nowrap;
}
.section-row .row-desc {
  font-size: 12.5px;
  color: var(--fg-muted);
  line-height: 1.5;
}
.section-row .chev {
  flex-shrink: 0;
  color: var(--fg-faint);
}

.kv {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-faint);
}
.kv:last-child { border-bottom: none; }
.kv .k { font-size: 13px; color: var(--fg-muted); }
.kv .v { font-size: 13px; color: var(--fg); }
.kv .v.mono { font-family: var(--font-mono); }

.danger-card {
  background: color-mix(in oklab, var(--danger) 4%, var(--surface));
  border: 1px solid color-mix(in oklab, var(--danger) 25%, var(--border));
  border-radius: 14px;
  padding: 24px;
}
.danger-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--danger);
  letter-spacing: -0.01em;
}
.danger-lede {
  font-size: 13px;
  color: var(--fg-muted);
  margin: 4px 0 18px;
  line-height: 1.55;
}

.info-block {
  padding: 12px 14px;
  border-radius: 8px;
  background: var(--surface-hover);
  border: 1px solid var(--border-faint);
  font-size: 12.5px;
  color: var(--fg-muted);
  line-height: 1.55;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.info-block svg { margin-top: 2px; flex-shrink: 0; }

.error-banner {
  padding: 14px 16px;
  border-radius: 12px;
  background: color-mix(in oklab, var(--danger) 8%, var(--surface));
  border: 1px solid color-mix(in oklab, var(--danger) 30%, var(--border));
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.error-banner .badge {
  width: 24px;
  height: 24px;
  border-radius: 999px;
  background: var(--danger);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.error-banner .body { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.error-banner .title {
  font-size: 14px;
  font-weight: 600;
  color: var(--fg);
  letter-spacing: -0.005em;
}
.error-banner .desc {
  font-size: 12.5px;
  color: var(--fg-muted);
  line-height: 1.55;
}
.error-banner .meta {
  display: flex;
  gap: 8px;
  margin-top: 6px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--fg-faint);
}

.form-stack { display: flex; flex-direction: column; gap: 16px; }
.row-end { display: flex; justify-content: flex-end; gap: 8px; }
.row-between { display: flex; justify-content: space-between; align-items: center; }

.link-muted {
  font-size: 12.5px;
  color: var(--fg-muted);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.link-muted span.u { text-decoration: underline; }
</style>
</head>
<body>
<div class="shell">
  <header class="header">
    <a class="brand" href="/settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 6L11 12L5 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M13 18H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      <span class="brand-name">Prout</span>
    </a>
    <div class="header-right">
      {{if .Host}}<span class="host-status"><span class="dot"></span><span class="host">{{.Host}}</span></span>{{end}}
      <button class="theme-toggle" type="button" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
        <svg class="i-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
    </div>
  </header>

  {{if .Breadcrumb}}
  <nav class="breadcrumb" aria-label="breadcrumb">
    {{range $i, $b := .Breadcrumb}}
      {{if $i}}<span class="sep">/</span>{{end}}
      {{if $b.Href}}<a href="{{$b.Href}}">{{$b.Label}}</a>{{else}}<span class="current">{{$b.Label}}</span>{{end}}
    {{end}}
  </nav>
  {{end}}

  <main class="content">
    <div class="content-inner">
      {{template "content" .}}
    </div>
  </main>
</div>

<script>
(function () {
  var KEY = 'prout-theme';
  var root = document.documentElement;
  var saved = localStorage.getItem(KEY);
  if (saved === 'light' || saved === 'dark') {
    root.dataset.theme = saved;
  }
  var btn = document.getElementById('theme-toggle');
  if (btn) {
    btn.addEventListener('click', function () {
      var next = root.dataset.theme === 'dark' ? 'light' : 'dark';
      root.dataset.theme = next;
      localStorage.setItem(KEY, next);
    });
  }
})();
</script>
</body>
</html>
{{end}}
