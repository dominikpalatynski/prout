version: "2"
sql:
  - engine: postgresql
    schema: migrations
    queries: internal/store/queries
    gen:
      go:
        package: sqlc
        out: internal/store/sqlc
        sql_package: pgx/v5
        emit_pointers_for_null_types: true
        emit_prepared_queries: false
        emit_interface: false
        emit_json_tags: false
        emit_db_tags: false
        emit_exact_table_names: true
        rename:
          pr_number: PRNumber
          pr_url: PRURL
          sha: SHA
          ttl: TTL
          url: URL
